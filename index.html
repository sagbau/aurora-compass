<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aurora Compass</title>
  <style>
    body { background:#0b1020; color:#e6e8ef; font-family: system-ui; }
    .card { background:#141a34; padding:20px; width:320px; border-radius:12px; }
  </style>
</head>
<body>

<h1>Aurora Compass</h1>

<div class="card">
  <div id="bz">Bz: —</div>
  <div id="speed">Speed: —</div>
  <div id="density">Density: —</div>
</div>

<script>
  fetch("/api/solarwind")
    .then(r => r.json())
    .then(d => {
      document.getElementById("bz").textContent =
        "Bz: " + d.bz + " nT";
      document.getElementById("speed").textContent =
        "Speed: " + d.speed + " km/s";
      document.getElementById("density").textContent =
        "Density: " + d.density + " p/cm³";
    })
    .catch(err => {
      console.error(err);
      document.querySelector(".card").textContent = "Data error";
    });
</script>

</body>
</html>
``
