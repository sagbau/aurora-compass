<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aurora Compass</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: system-ui;
      background: linear-gradient(180deg, #050711, #0b1020);
      color: #e6e8ef;
    }
    .card {
      background: #141a34;
      border-radius: 16px;
      padding: 24px;
      width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .row { margin: 6px 0; }
    .section {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .meta { opacity: 0.7; font-size: 12px; }
  </style>
</head>
<body>

<h1>Aurora Compass</h1>

<div class="card">
  <div class="row" id="bz">Bz: —</div>
  <div class="row" id="bt">Bt: —</div>
  <div class="row" id="speed">Speed: —</div>
  <div class="row" id="density">Density: —</div>

  <div class="section">
    <div class="row" id="kpNow">Kp now: —</div>
    <div class="row" id="kp2h">Kp +2h: —</div>
    <div class="row" id="kp24h">Kp +24h: —</div>
    <div class="row" id="kp72h">Kp +72h: —</div>
  </div>

  <div class="section">
    <div class="row" id="eta">ETA to Earth: —</div>
    <div class="row" id="arrival">Expected arrival: —</div>
  </div>

  <div class="meta" id="time">Measurement time: —</div>
  <div class="meta" id="source">Source: —</div>
</div>

<script>
  fetch("/api/solarwind")
    .then(r => r.json())
    .then(d => {
      document.getElementById("bz").textContent = `Bz: ${d.bz.toFixed(2)} nT`;
      document.getElementById("bt").textContent = `Bt: ${d.bt.toFixed(2)} nT`;
      document.getElementById("speed").textContent = `Speed: ${d.speed.toFixed(1)} km/s`;
      document.getElementById("density").textContent = `Density: ${d.density.toFixed(2)} p/cm³`;

      document.getElementById("kpNow").textContent =
        d.kpNow != null ? `Kp now: ${d.kpNow}` : "Kp now: n/a";
      document.getElementById("kp2h").textContent =
        d.kpForecast2h != null ? `Kp +2h: ${d.kpForecast2h}` : "Kp +2h: n/a";
      document.getElementById("kp24h").textContent =
        d.kpForecast24h != null ? `Kp +24h: ${d.kpForecast24h}` : "Kp +24h: n/a";
      document.getElementById("kp72h").textContent =
        d.kpForecast72h != null ? `Kp +72h: ${d.kpForecast72h}` : "Kp +72h: n/a";

      document.getElementById("eta").textContent =
        `ETA to Earth: ${d.etaMinutes} min`;
      document.getElementById("arrival").textContent =
        `Expected arrival: ${new Date(d.arrivalTime).toUTCString()}`;

      document.getElementById("time").textContent = `Measurement time: ${d.timestamp}`;
      document.getElementById("source").textContent = `Source: ${d.source}`;
    })
    .catch(err => console.warn(err));
</script>

</body>
</html>
``
