<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aurora Compass</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: #0b1020;
      color: #e6e8ef;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 2rem;
    }
    .card {
      background: #141a34;
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 420px;
    }
    .value {
      font-size: 1.6rem;
      font-weight: bold;
      margin: 0.5rem 0;
    }
    .hint {
      margin-top: 1rem;
      opacity: 0.7;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>Aurora Compass</h1>
  <p>Live solar wind conditions</p>

  <div class="card">
    <div class="value" id="bz">Bz: —</div>
    <div class="value" id="speed">Speed: —</div>
    <div class="value" id="density">Density: —</div>

    <div class="hint">
      Data source: NOAA DSCOVR
    </div>
  </div>

  <script>
    fetch("/api/solarwind")
      .then(res => res.json())
      .then(data => {
        document.getElementById("bz").textContent =
          "Bz: " + data.bz + " nT";
        document.getElementById("speed").textContent =
          "Speed: " + data.speed + " km/s";
        document.getElementById("density").textContent =
          "Density: " + data.density + " p/cm³";
      })
      .catch(() => {
        document.querySelector(".card").textContent =
          "Live data currently unavailable.";
      });
  </script>

</body>
</html>
