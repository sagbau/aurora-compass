<script>
  fetch("/api/solarwind_rtsw")
    .then(res => res.json())
    .then(data => {
      document.getElementById("bz").textContent =
        "Bz: " + data.bz + " nT";
      document.getElementById("speed").textContent =
        "Speed: " + data.speed + " km/s";
      document.getElementById("density").textContent =
        "Density: " + data.density + " p/cm³";
    })
    .catch(() => {
      document.querySelector(".card").textContent =
        "Live NOAA data unavailable.";
    });
</script>
